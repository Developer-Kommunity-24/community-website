name: Weekly Analytics Report

# This workflow sends a weekly analytics report every Monday morning
# It can also be triggered manually from the Actions tab

on:
  schedule:
    # Run at 9:00 AM IST (3:30 AM UTC) every Monday
    - cron: "30 3 * * 1"
  workflow_dispatch:

jobs:
  send-weekly-report:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    name: Weekly Report (Node ${{ matrix.node-version }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate and send weekly analytics report
        env:
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          NEXT_PUBLIC_POSTHOG_HOST: https://app.posthog.com
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: dk24consortium@gmail.com
        run: npm run report:weekly
